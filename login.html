<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Patient | MK CABINET MEDICAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MK CABINET MEDICAL</a>
            <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill">
                <i class="bi bi-arrow-left me-1"></i> Retour
            </a>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    
                    <div class="card login-card shadow-lg p-4">
                        <div class="text-center mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                                <i class="bi bi-shield-lock fs-2"></i>
                            </div>
                            <h2 class="fw-bold h4">Espace Patient</h2>
                            <p class="text-muted small">Connectez-vous pour accéder à vos résultats et rendez-vous.</p>
                        </div>

                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Identifiant ou Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" placeholder="Ex: Boubacar Camara" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small">Mot de passe</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                                </div>
                                <div class="text-end mt-1">
                                    <a href="#" class="text-primary small text-decoration-none">Mot de passe oublié ?</a>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm">
                                    Se connecter
                                </button>
                            </div>

                            <div class="text-center mt-4 pt-3 border-top">
                                <p class="small text-muted">Vous n'avez pas encore d'identifiants ?</p>
                                <a href="contact.html" class="fw-bold text-primary text-decoration-none small">
                                    Faire une demande d'accès
                                </a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-3 text-center border-top">
        <p class="small text-muted mb-0">&copy; 2026 MK CABINET MEDICAL - Accès Sécurisé SSL</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
